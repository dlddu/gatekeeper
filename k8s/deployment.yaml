apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper
  namespace: default
  labels:
    app: gatekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
    spec:
      containers:
        - name: gatekeeper
          image: gatekeeper:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: jwt-secret
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: vapid-public-key
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: vapid-private-key
          volumeMounts:
            - name: data
              mountPath: /app/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gatekeeper-pvc
