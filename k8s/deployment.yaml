apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatekeeper
  namespace: default
  labels:
    app: gatekeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatekeeper
  template:
    metadata:
      labels:
        app: gatekeeper
    spec:
      initContainers:
        - name: prisma-db-push
          image: ghcr.io/dlddu/gatekeeper:latest
          command: ["sh", "-c", "npx prisma db push --accept-data-loss && node prisma/seed-admin.js"]
          env:
            - name: DATABASE_URL
              value: "file:/app/data/gatekeeper.db"
          volumeMounts:
            - name: data
              mountPath: /app/data
      containers:
        - name: gatekeeper
          image: ghcr.io/dlddu/gatekeeper:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              value: "file:/app/data/gatekeeper.db"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: JWT_SECRET
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: VAPID_PUBLIC_KEY
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: VAPID_PRIVATE_KEY
            - name: VAPID_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: VAPID_SUBJECT
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: API_SECRET_KEY
            - name: OIDC_ISSUER
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: OIDC_ISSUER
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: OIDC_CLIENT_ID
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_REDIRECT_URI
              valueFrom:
                secretKeyRef:
                  name: gatekeeper-secrets
                  key: OIDC_REDIRECT_URI
          volumeMounts:
            - name: data
              mountPath: /app/data
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gatekeeper-pvc
