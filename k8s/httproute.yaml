apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gatekeeper
  namespace: default
spec:
  parentRefs:
    - name: main-gateway
      namespace: gateway-system
  hostnames:
    - "gatekeeper.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gatekeeper
          port: 80
